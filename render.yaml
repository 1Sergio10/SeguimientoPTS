databases:
  - name: pts-db
    plan: free
    databaseName: ptsdb
    user: ptsuser

services:
  - type: web
    name: pts-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://0.0.0.0:10000
      - key: JWT__KEY
        sync: false
      - key: JWT__ISSUER
        value: PTS.API
      - key: JWT__AUDIENCE
        value: PTS.CLIENT
      - key: ConnectionStrings__Default
        fromDatabase:
          name: pts-db
          property: connectionString
